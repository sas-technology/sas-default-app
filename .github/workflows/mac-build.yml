name: Mac build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        # Uses the version declared by `packageManager` in package.json.
        uses: pnpm/action-setup@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install xcodegen + create-dmg
        run: brew install xcodegen create-dmg

      - name: Build SASApp.dmg
        run: ./apps/mac/scripts/build.sh

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: SASApp-dmg
          path: apps/mac/dist/*.dmg

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mac/dist/*.dmg
