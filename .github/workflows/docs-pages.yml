name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs-site
      - name: Stage docs into site/
        run: |
          mkdir -p docs-site/site
          cp -r docs/* docs-site/site/
          cp README.md docs-site/site/index.md
      - name: Build with Jekyll
        run: cd docs-site && bundle exec jekyll build -s site -d _site
        env:
          JEKYLL_ENV: production
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/_site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
