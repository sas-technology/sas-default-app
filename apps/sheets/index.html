<!doctype html>
<html lang="en">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <title>SAS MiniApp — Sheets edition</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1a1a1a;
        --bg: #fafafa;
        --muted: #555;
        --border: #d4d4d4;
        --accent: #1f6feb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #f5f5f5;
          --bg: #111;
          --muted: #aaa;
          --border: #333;
        }
      }
      * { box-sizing: border-box; }
      body { font: 16px/1.5 system-ui, sans-serif; color: var(--fg); background: var(--bg); margin: 0; padding: 1.5rem; max-width: 42rem; margin-inline: auto; }
      h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
      .user { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
      label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
      textarea { width: 100%; min-height: 5rem; padding: 0.5rem; font: inherit; color: inherit; background: transparent; border: 1px solid var(--border); border-radius: 6px; }
      button { margin-top: 0.5rem; padding: 0.5rem 1rem; font: inherit; color: #fff; background: var(--accent); border: 0; border-radius: 6px; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .notes { margin-top: 2rem; list-style: none; padding: 0; }
      .note { padding: 0.75rem 0; border-top: 1px solid var(--border); }
      .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.25rem; }
      .body { white-space: pre-wrap; word-break: break-word; }
      .status { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; }
    </style>
  </head>
  <body>
    <h1>Notes</h1>
    <p class="user">Signed in as <span id="user">…</span></p>

    <form id="form">
      <label for="body">Add a note</label>
      <textarea id="body" name="body" maxlength="5000" required></textarea>
      <button type="submit" id="submit">Add note</button>
      <p class="status" id="status" role="status" aria-live="polite"></p>
    </form>

    <h2>Recent</h2>
    <ul class="notes" id="notes" aria-busy="true"><li class="note">Loading…</li></ul>

    <script>
      const $ = (id) => document.getElementById(id)

      function setStatus(msg) { $("status").textContent = msg }

      function clearChildren(node) {
        while (node.firstChild) node.removeChild(node.firstChild)
      }

      function renderEmpty(list, text) {
        clearChildren(list)
        const li = document.createElement("li")
        li.className = "note"
        li.textContent = text
        list.append(li)
      }

      function loadUser() {
        google.script.run
          .withSuccessHandler((u) => { $("user").textContent = u.email || "unknown" })
          .withFailureHandler(() => { $("user").textContent = "unknown" })
          .getCurrentUser()
      }

      function loadNotes() {
        const list = $("notes")
        list.setAttribute("aria-busy", "true")
        google.script.run
          .withSuccessHandler((notes) => {
            list.setAttribute("aria-busy", "false")
            clearChildren(list)
            if (!notes.length) {
              renderEmpty(list, "No notes yet.")
              return
            }
            notes.slice().reverse().forEach((n) => {
              const li = document.createElement("li")
              li.className = "note"
              const meta = document.createElement("div")
              meta.className = "meta"
              meta.textContent = `${n.author} · ${new Date(n.timestamp).toLocaleString()}`
              const body = document.createElement("div")
              body.className = "body"
              body.textContent = n.body
              li.append(meta, body)
              list.append(li)
            })
          })
          .withFailureHandler((err) => {
            list.setAttribute("aria-busy", "false")
            renderEmpty(list, "Failed to load: " + err.message)
          })
          .getNotes()
      }

      $("form").addEventListener("submit", (e) => {
        e.preventDefault()
        const body = $("body").value.trim()
        if (!body) return
        $("submit").disabled = true
        setStatus("Saving…")
        google.script.run
          .withSuccessHandler(() => {
            $("body").value = ""
            $("submit").disabled = false
            setStatus("Saved.")
            loadNotes()
          })
          .withFailureHandler((err) => {
            $("submit").disabled = false
            setStatus("Error: " + err.message)
          })
          .saveNote(body)
      })

      loadUser()
      loadNotes()
    </script>
  </body>
</html>
