name: SASApp
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.sas-technology
settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_BUNDLE_IDENTIFIER: com.sas-technology.sas-app
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  SASApp:
    type: application
    platform: macOS
    sources:
      - path: SASApp
        excludes: ["Bundled/**"]
    resources:
      - path: SASApp/Resources
      - path: SASApp/Bundled
        optional: true
    info:
      path: SASApp/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        CFBundleDisplayName: "SAS App"
        CFBundleShortVersionString: "1.0.0"
        NSHumanReadableCopyright: "MIT License"
    entitlements:
      path: SASApp/SASApp.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Manual
  SASAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SASAppTests
    dependencies:
      - target: SASApp
